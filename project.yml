name: BarbieTasks
options:
  bundleIdPrefix: com.mappy4ever
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.4"

targets:
  BarbieTasks:
    type: application
    platform: macOS
    sources:
      - path: BarbieTasks
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: Sparkle
      - target: BarbieTasksWidget
    settings:
      base:
        MARKETING_VERSION: "1.2"
        CURRENT_PROJECT_VERSION: "202603140001"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: BarbieTasks/BarbieTasks.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Small Wins"
        INFOPLIST_KEY_CFBundleName: "Small Wins"
        PRODUCT_NAME: "Small Wins"
        INFOPLIST_KEY_NSCalendarsUsageDescription: "Small Wins shows your calendar events alongside tasks."
        INFOPLIST_KEY_NSRemindersUsageDescription: "Small Wins can import and sync with Apple Reminders."
    postBuildScripts:
      - name: "Inject Sparkle Keys into Info.plist"
        script: |
          PLIST="${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
          /usr/libexec/PlistBuddy -c "Add :SUPublicEDKey string 'EHEH4xRuex6WuC1pPc9iVzUtveF9FGOLoRP+3zkscZ8='" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :SUPublicEDKey 'EHEH4xRuex6WuC1pPc9iVzUtveF9FGOLoRP+3zkscZ8='" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :SUFeedURL string 'https://raw.githubusercontent.com/mappy4ever/GlammerPlanner/main/appcast.xml'" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :SUFeedURL 'https://raw.githubusercontent.com/mappy4ever/GlammerPlanner/main/appcast.xml'" "$PLIST"

  BarbieTasksWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: BarbieTasksWidget
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        MARKETING_VERSION: "1.2"
        CURRENT_PROJECT_VERSION: "202603140001"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Small Wins Widgets"
        PRODUCT_NAME: "Small Wins Widgets"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: "com.apple.widgetkit-extension"
